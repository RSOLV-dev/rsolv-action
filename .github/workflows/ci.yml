name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Prepare node_modules directory
        run: |
          rm -rf node_modules
          mkdir -p node_modules

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install --ignore-scripts

      - name: Run tests
        run: bun run test:ci
        env:
          CI: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: |
            test-report.json
            .vitest-shards/*.json
          retention-days: 30

      - name: Run type check
        run: bun run typecheck

      - name: Run lint
        run: bun run lint

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Prepare node_modules directory
        run: |
          rm -rf node_modules
          mkdir -p node_modules

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install --ignore-scripts

      - name: Build Docker image
        run: docker build -t rsolv/action:latest .

      # In a real CI setup, we would push the Docker image to a registry here
