# RSOLV Automated Demo Workflow
#
# This workflow demonstrates the scan+matrix process pattern for automated
# security scanning and fixing. It scans for vulnerabilities, then processes
# each detected issue independently via matrix strategy.

name: RSOLV Automated Security Demo

on:
  workflow_dispatch:
    inputs:
      max_issues:
        description: 'Maximum number of issues to scan'
        required: false
        default: '5'
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  scan:
    name: Scan for Vulnerabilities
    runs-on: ubuntu-latest
    outputs:
      pipeline_run_id: ${{ steps.rsolv.outputs.pipeline_run_id }}
      issue_numbers: ${{ steps.rsolv.outputs.issue_numbers }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: RSOLV Scan
        id: rsolv
        uses: RSOLV-dev/RSOLV-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          rsolvApiKey: ${{ secrets.RSOLV_API_KEY }}
          mode: 'scan'
          max_issues: ${{ inputs.max_issues || '5' }}

      - name: Display Scan Results
        run: |
          echo "Scan Complete"
          echo "Pipeline Run ID: ${{ steps.rsolv.outputs.pipeline_run_id }}"
          echo "Issue numbers: ${{ steps.rsolv.outputs.issue_numbers }}"

  process:
    name: "Process Issue #${{ matrix.issue_number }}"
    needs: scan
    if: needs.scan.outputs.issue_numbers != '[]'
    strategy:
      matrix:
        issue_number: ${{ fromJSON(needs.scan.outputs.issue_numbers) }}
      fail-fast: false
      max-parallel: 1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: RSOLV-dev/RSOLV-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          rsolvApiKey: ${{ secrets.RSOLV_API_KEY }}
          mode: 'process'
          pipeline_run_id: ${{ needs.scan.outputs.pipeline_run_id }}
          issue_number: ${{ matrix.issue_number }}
