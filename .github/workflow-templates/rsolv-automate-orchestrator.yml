# RSOLV Automated Orchestration Workflow
#
# This workflow orchestrates the scan+matrix process flow when the
# rsolv:automate label is applied to an issue, or via manual dispatch.
#
# When triggered by label on a single issue, it runs process mode directly.
# When triggered manually without an issue number, it runs scan+matrix.

name: RSOLV Automate Orchestrator

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process (leave empty for full scan+matrix)'
        required: false
        type: string
      max_issues:
        description: 'Maximum issues to scan (only used when issue_number is empty)'
        required: false
        default: '3'
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # Single-issue processing: triggered by label or manual dispatch with issue_number
  process-single:
    name: Process Single Issue
    runs-on: ubuntu-latest
    if: |
      (github.event.label.name == 'rsolv:automate') ||
      (github.event_name == 'workflow_dispatch' && inputs.issue_number != '')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: RSOLV-dev/RSOLV-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          rsolvApiKey: ${{ secrets.RSOLV_API_KEY }}
          mode: 'process'
          issue_number: ${{ github.event.issue.number || inputs.issue_number }}

      - name: Status
        if: always()
        run: |
          echo "Orchestration Summary:"
          echo "- Issue: #${{ github.event.issue.number || inputs.issue_number }}"
          echo "- Result: ${{ job.status }}"

  # Full scan+matrix: manual dispatch without specific issue number
  scan:
    name: Scan for Vulnerabilities
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.issue_number == ''
    outputs:
      pipeline_run_id: ${{ steps.rsolv.outputs.pipeline_run_id }}
      issue_numbers: ${{ steps.rsolv.outputs.issue_numbers }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: rsolv
        uses: RSOLV-dev/RSOLV-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          rsolvApiKey: ${{ secrets.RSOLV_API_KEY }}
          mode: 'scan'
          max_issues: ${{ inputs.max_issues || '3' }}

  process-matrix:
    name: "Process Issue #${{ matrix.issue_number }}"
    needs: scan
    if: needs.scan.outputs.issue_numbers != '[]'
    strategy:
      matrix:
        issue_number: ${{ fromJSON(needs.scan.outputs.issue_numbers) }}
      fail-fast: false
      max-parallel: 1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: RSOLV-dev/RSOLV-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          rsolvApiKey: ${{ secrets.RSOLV_API_KEY }}
          mode: 'process'
          pipeline_run_id: ${{ needs.scan.outputs.pipeline_run_id }}
          issue_number: ${{ matrix.issue_number }}
