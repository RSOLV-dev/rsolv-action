# RSOLV Security Workflow Template
#
# This workflow implements the RSOLV scan+matrix process pattern for automated
# security vulnerability detection and remediation:
# 1. SCAN: Detect vulnerabilities and create GitHub issues (one per vulnerability type)
# 2. PROCESS: Validate and fix each issue independently via matrix strategy
# 3. BILLING: Trigger credit consumption when PR is merged (RFC-091)
#
# Usage:
#   1. Add this file to .github/workflows/ in your repository
#   2. Set up RSOLV_API_KEY secret in your repository settings
#   3. Run workflow manually via Actions tab or let it trigger on pushes
#
# Requirements:
#   - RSOLV_API_KEY secret (get yours at https://rsolv.dev)
#   - Contents: write permission
#   - Issues: write and Pull-requests: write permissions for GitHub Actions
#   - "Allow GitHub Actions to create and approve pull requests" enabled
#
# RFC-091 Status (December 2025):
#   - Billing mode implemented for credit consumption on PR merge
#   - Primary billing mechanism (Action-initiated, guaranteed execution)
#   - Idempotent: safe to run multiple times, won't double-bill

name: RSOLV Security Workflow

on:
  workflow_dispatch:
    inputs:
      max_issues:
        description: 'Maximum number of issues to scan'
        required: false
        default: '10'
        type: string
      demo_mode:
        description: 'Enable demo mode (auto-processes all created issues)'
        required: false
        default: false
        type: boolean

  # RFC-091: Trigger billing when PR is merged
  pull_request:
    types: [closed]

  # Uncomment to enable automatic scanning on code changes
  # push:
  #   branches: [ main, develop ]

jobs:
  # =====================================================
  # SCAN: Detect vulnerabilities and output issue numbers
  # =====================================================
  scan:
    name: Scan for Vulnerabilities
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    permissions:
      contents: write
      pull-requests: write
      issues: write

    outputs:
      pipeline_run_id: ${{ steps.rsolv.outputs.pipeline_run_id }}
      issue_numbers: ${{ steps.rsolv.outputs.issue_numbers }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: RSOLV Scan
        id: rsolv
        uses: RSOLV-dev/RSOLV-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RSOLV_DEMO_MODE: ${{ github.event.inputs.demo_mode || 'false' }}
        with:
          rsolvApiKey: ${{ secrets.RSOLV_API_KEY }}
          mode: 'scan'
          max_issues: ${{ inputs.max_issues || '10' }}

      - name: Display Scan Results
        run: |
          echo "Vulnerability Scan Results:"
          echo "Pipeline Run ID: ${{ steps.rsolv.outputs.pipeline_run_id }}"
          echo "Issue numbers: ${{ steps.rsolv.outputs.issue_numbers }}"

  # =====================================================
  # PROCESS: Validate + fix each issue via matrix
  # =====================================================
  process:
    name: "Process Issue #${{ matrix.issue_number }}"
    needs: scan
    if: needs.scan.outputs.issue_numbers != '[]'

    permissions:
      contents: write
      pull-requests: write
      issues: write

    strategy:
      matrix:
        issue_number: ${{ fromJSON(needs.scan.outputs.issue_numbers) }}
      fail-fast: false
      max-parallel: 1

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: RSOLV-dev/RSOLV-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          rsolvApiKey: ${{ secrets.RSOLV_API_KEY }}
          mode: 'process'
          pipeline_run_id: ${{ needs.scan.outputs.pipeline_run_id }}
          issue_number: ${{ matrix.issue_number }}

  # =====================================================
  # Summary
  # =====================================================
  summary:
    name: Security Analysis Summary
    runs-on: ubuntu-latest
    needs: [scan, process]
    if: always() && github.event_name == 'workflow_dispatch'
    steps:
      - name: Summary
        run: |
          echo "RSOLV Security Analysis Complete"
          echo ""
          echo "What happens next:"
          echo "1. Check the 'Issues' tab for detected vulnerabilities"
          echo "2. Check the 'Pull Requests' tab for fix proposals"
          echo "3. When PRs are merged, credits will be consumed automatically"
          echo ""
          echo "Learn more: https://docs.rsolv.dev/scan-matrix-workflow"

  # =====================================================
  # RFC-091: Billing Phase - Triggered on PR Merge
  # =====================================================
  # This job runs when a PR is merged to consume credits.
  # It's idempotent - safe to run multiple times without double-billing.
  #
  # The billing system has three layers of protection:
  # 1. Action billing (this job) - PRIMARY, guaranteed by GitHub Actions SLA
  # 2. Webhook billing - BACKUP, triggered by GitHub webhook
  # 3. Cleanup worker - SAFETY NET, catches any missed billing every 5 minutes

  rsolv-billing:
    name: RSOLV Billing
    runs-on: ubuntu-latest

    # Only run when a PR is merged (not just closed)
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true

    steps:
      - uses: actions/checkout@v4

      - name: RSOLV Billing for Merged PR
        uses: RSOLV-dev/RSOLV-action@v4
        with:
          rsolvApiKey: ${{ secrets.RSOLV_API_KEY }}
          mode: 'billing'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Billing Summary
        run: |
          echo "RSOLV Billing Complete"
          echo ""
          echo "PR #${{ github.event.pull_request.number }} has been processed."
          echo "If this was an RSOLV-generated fix, credits have been consumed."
          echo ""
          echo "Note: This billing is idempotent - no double-billing will occur."
