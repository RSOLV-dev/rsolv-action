# RSOLV Label-Triggered Selective Processing
#
# This workflow enables selective vulnerability processing via labels.
# Perfect for testing specific vulnerability types without processing all issues.
#
# How to use:
# 1. Run SCAN phase to identify all vulnerabilities
# 2. Add 'rsolv:validate' label to specific issues you want to process
# 3. The workflow will trigger and process only labeled issues
#
# Or use the manual dispatch to scan+matrix process all issues at once.

name: RSOLV Selective Processing

on:
  # Trigger when labels are added to issues
  issues:
    types: [labeled]

  # Manual trigger: scan+matrix for batch processing
  workflow_dispatch:
    inputs:
      max_issues:
        description: 'Maximum number of issues to scan'
        required: false
        default: '5'
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # Single-issue processing when rsolv:validate label is added
  process-labeled-issue:
    if: |
      github.event_name == 'issues' &&
      github.event.label.name == 'rsolv:validate'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Process Labeled Issue
        uses: RSOLV-dev/RSOLV-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        with:
          rsolvApiKey: ${{ secrets.RSOLV_API_KEY }}
          mode: 'process'
          issue_number: ${{ github.event.issue.number }}

  # Scan+matrix for manual dispatch: scan all, then process each via matrix
  scan:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      pipeline_run_id: ${{ steps.rsolv.outputs.pipeline_run_id }}
      issue_numbers: ${{ steps.rsolv.outputs.issue_numbers }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: RSOLV Scan
        id: rsolv
        uses: RSOLV-dev/RSOLV-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        with:
          rsolvApiKey: ${{ secrets.RSOLV_API_KEY }}
          mode: 'scan'
          max_issues: ${{ inputs.max_issues || '5' }}

  process-matrix:
    name: "Process Issue #${{ matrix.issue_number }}"
    needs: scan
    if: needs.scan.outputs.issue_numbers != '[]'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        issue_number: ${{ fromJSON(needs.scan.outputs.issue_numbers) }}
      fail-fast: false
      max-parallel: 2

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Process Issue ${{ matrix.issue_number }}
        uses: RSOLV-dev/RSOLV-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        with:
          rsolvApiKey: ${{ secrets.RSOLV_API_KEY }}
          mode: 'process'
          pipeline_run_id: ${{ needs.scan.outputs.pipeline_run_id }}
          issue_number: ${{ matrix.issue_number }}

# Usage Examples:
#
# 1. Process a single issue via label:
#    - Go to issue #926 (XSS)
#    - Add label "rsolv:validate"
#    - Workflow automatically triggers for that issue
#
# 2. Scan and process all issues via manual dispatch:
#    - Go to Actions tab
#    - Select "RSOLV Selective Processing"
#    - Click "Run workflow"
#    - Set max_issues (default: 5)
#    - Each detected issue gets its own matrix job
