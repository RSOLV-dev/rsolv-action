# RSOLV Scan + Matrix Process Demo
#
# This workflow demonstrates the RSOLV scan+matrix process pattern:
# 1. SCAN: Detect vulnerabilities and output issue numbers + pipeline run ID
# 2. PROCESS: Matrix job processes each issue independently (validate + mitigate)
#
# The scan job produces outputs consumed by a matrix strategy, so each issue
# gets its own isolated runner. This replaces the old three-job sequential
# (scan -> validate -> mitigate) pattern.

name: RSOLV Scan + Matrix Process Demo

on:
  workflow_dispatch:
    inputs:
      max_issues:
        description: 'Maximum number of issues to process'
        required: false
        type: number
        default: 5
      debug:
        description: 'Enable debug logging'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  scan:
    name: "Scan - Detect Vulnerabilities"
    runs-on: ubuntu-latest
    outputs:
      pipeline_run_id: ${{ steps.rsolv.outputs.pipeline_run_id }}
      issue_numbers: ${{ steps.rsolv.outputs.issue_numbers }}
    steps:
      - uses: actions/checkout@v4

      - name: RSOLV Scan
        id: rsolv
        uses: RSOLV-dev/RSOLV-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: ${{ inputs.debug && 'rsolv:*' || '' }}
        with:
          rsolvApiKey: ${{ secrets.RSOLV_API_KEY }}
          mode: 'scan'
          max_issues: ${{ inputs.max_issues }}

      - name: Scan Results Summary
        run: |
          echo "Scan Complete"
          echo "Pipeline Run ID: ${{ steps.rsolv.outputs.pipeline_run_id }}"
          echo "Issue numbers: ${{ steps.rsolv.outputs.issue_numbers }}"

  process:
    name: "Process Issue #${{ matrix.issue_number }}"
    needs: scan
    if: needs.scan.outputs.issue_numbers != '[]'
    strategy:
      matrix:
        issue_number: ${{ fromJSON(needs.scan.outputs.issue_numbers) }}
      fail-fast: false
      max-parallel: 1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: RSOLV-dev/RSOLV-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: ${{ inputs.debug && 'rsolv:*' || '' }}
        with:
          rsolvApiKey: ${{ secrets.RSOLV_API_KEY }}
          mode: 'process'
          pipeline_run_id: ${{ needs.scan.outputs.pipeline_run_id }}
          issue_number: ${{ matrix.issue_number }}

  summary:
    name: "Demo Complete Summary"
    runs-on: ubuntu-latest
    needs: [scan, process]
    if: always()
    steps:
      - name: Generate Demo Summary
        run: |
          echo "RSOLV Scan + Process Demo Complete"
          echo ""
          echo "## Results Summary:"
          echo ""
          echo "### Scan"
          echo "- Status: ${{ needs.scan.result }}"
          echo "- Pipeline Run ID: ${{ needs.scan.outputs.pipeline_run_id || 'N/A' }}"
          echo "- Issue Numbers: ${{ needs.scan.outputs.issue_numbers || '[]' }}"
          echo ""
          echo "### Process"
          echo "- Status: ${{ needs.process.result }}"
          echo "- Each issue was processed independently via matrix strategy"
          echo ""
          echo "## Next Steps:"
          echo "1. Review created issues in the Issues tab"
          echo "2. Review and merge pull requests with fixes"
